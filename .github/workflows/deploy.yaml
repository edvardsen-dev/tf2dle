name: Deploy

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to deploy, e.g. 1.7.8
        required: true
        type: string

env:
  IMAGE_REPOSITORY: ghcr.io/edvardsen-dev/tf2dle/sveltekit

jobs:
  build-and-publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg PUBLIC_CDN_URL="https://cdn.jsdelivr.net/gh/edvardsen-dev/tf2dle@${{ github.sha }}/static/images" \
            --build-arg PUBLIC_APP_VERSION="$RELEASE_TAG" \
            -t "$IMAGE_REPOSITORY:$RELEASE_TAG" \
            -t "$IMAGE_REPOSITORY:latest" .

      - name: Push Docker Image
        run: |
          docker push "$IMAGE_REPOSITORY:$RELEASE_TAG"
          docker push "$IMAGE_REPOSITORY:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-and-publish.result == 'success')
    env:
      APP_DIR: /root/apps/tf2dle
      DEPLOY_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
      IMAGE_URL: ghcr.io/edvardsen-dev/tf2dle/sveltekit:${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Create directory if not already exists
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: APP_DIR
          script: |
            mkdir -p $APP_DIR

      - name: Copy docker-compose file to VM
        run: |
          scp -o StrictHostKeyChecking=no ./docker-compose.prod.yaml ${{ secrets.SSH_USER }}@${{ secrets.VM_IP }}:$APP_DIR/docker-compose.prod.yaml

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.1.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          ORIGIN: ${{ secrets.ORIGIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN, GHCR_USER, IMAGE_URL, DEPLOY_TAG, APP_DIR, ORIGIN, DATABASE_URL, DATABASE_USER, DATABASE_PASSWORD, DATABASE_NAME
          script: |
            # Match the older Docker daemon API version installed on the VM.
            export DOCKER_API_VERSION=1.43

            # Log in to GitHub Container Registry
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u $GHCR_USER --password-stdin

            # Change directory
            cd $APP_DIR

            # Create/Update the .env file with environment variables, append only if not already there
            grep -qF "DATABASE_URL" .env || echo "DATABASE_URL=${DATABASE_URL}" >> .env
            grep -qF "DATABASE_USER" .env || echo "DATABASE_USER=${DATABASE_USER}" >> .env
            grep -qF "DATABASE_PASSWORD" .env || echo "DATABASE_PASSWORD=${DATABASE_PASSWORD}" >> .env
            grep -qF "DATABASE_NAME" .env || echo "DATABASE_NAME=${DATABASE_NAME}" >> .env
            grep -qF "ORIGIN" .env || echo "ORIGIN=${ORIGIN}" >> .env

            # Pull the selected release image as per docker-compose.prod.yaml
            docker-compose -f docker-compose.prod.yaml pull

            # Run the docker-compose file with env variables
            docker-compose -f docker-compose.prod.yaml up -d

            # Clean up dangling images
            docker image prune -f
